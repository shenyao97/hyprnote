on:
  workflow_dispatch:
    inputs:
      provider:
        type: choice
        options:
          - deepgram
          - assemblyai
          - soniox
          - gladia
          - fireworks
          - openai
          - elevenlabs
  push:
    branches:
      - main
    paths:
      - crates/transcribe-proxy/**
      - crates/owhisper-client/src/adapter/**
  pull_request:
    paths:
      - crates/transcribe-proxy/**
      - crates/owhisper-client/src/adapter/**

jobs:
  detect-changes:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      provider: ${{ steps.detect.outputs.provider }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            deepgram:
              - 'crates/owhisper-client/src/adapter/deepgram/**'
            assemblyai:
              - 'crates/owhisper-client/src/adapter/assemblyai/**'
            soniox:
              - 'crates/owhisper-client/src/adapter/soniox/**'
            gladia:
              - 'crates/owhisper-client/src/adapter/gladia/**'
            fireworks:
              - 'crates/owhisper-client/src/adapter/fireworks/**'
            openai:
              - 'crates/owhisper-client/src/adapter/openai/**'
            elevenlabs:
              - 'crates/owhisper-client/src/adapter/elevenlabs/**'
      - id: detect
        run: |
          if [ "${{ steps.filter.outputs.deepgram }}" == "true" ]; then echo "provider=deepgram" >> $GITHUB_OUTPUT
          elif [ "${{ steps.filter.outputs.assemblyai }}" == "true" ]; then echo "provider=assemblyai" >> $GITHUB_OUTPUT
          elif [ "${{ steps.filter.outputs.soniox }}" == "true" ]; then echo "provider=soniox" >> $GITHUB_OUTPUT
          elif [ "${{ steps.filter.outputs.gladia }}" == "true" ]; then echo "provider=gladia" >> $GITHUB_OUTPUT
          elif [ "${{ steps.filter.outputs.fireworks }}" == "true" ]; then echo "provider=fireworks" >> $GITHUB_OUTPUT
          elif [ "${{ steps.filter.outputs.openai }}" == "true" ]; then echo "provider=openai" >> $GITHUB_OUTPUT
          elif [ "${{ steps.filter.outputs.elevenlabs }}" == "true" ]; then echo "provider=elevenlabs" >> $GITHUB_OUTPUT
          else echo "provider=deepgram" >> $GITHUB_OUTPUT
          fi

  setup:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: always()
    outputs:
      provider: ${{ steps.set.outputs.provider }}
    steps:
      - id: set
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "provider=${{ inputs.provider }}" >> $GITHUB_OUTPUT
          else
            echo "provider=${{ needs.detect-changes.outputs.provider }}" >> $GITHUB_OUTPUT
          fi

  batch:
    needs: setup
    if: needs.setup.outputs.provider != ''
    runs-on: depot-ubuntu-24.04-8
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust_install
        with:
          platform: linux
      - uses: ./.github/actions/infisical_install
      - run: |
          infisical run --token="$INFISICAL_TOKEN" --env=dev --projectId="$INFISICAL_PROJECT_ID" --path="/stt" -- bash -lc '
            set -euo pipefail

            provider="${PROVIDER}"
            input="${INPUT}"

            case "$provider" in
              deepgram)
                : "${DEEPGRAM_API_KEY:?DEEPGRAM_API_KEY is required}"
                export CHAR_BASE_URL="https://api.deepgram.com/v1"
                export CHAR_API_KEY="${DEEPGRAM_API_KEY}"
                ;;
              assemblyai)
                : "${ASSEMBLYAI_API_KEY:?ASSEMBLYAI_API_KEY is required}"
                export CHAR_BASE_URL="https://api.assemblyai.com/v2"
                export CHAR_API_KEY="${ASSEMBLYAI_API_KEY}"
                ;;
              soniox)
                : "${SONIOX_API_KEY:?SONIOX_API_KEY is required}"
                export CHAR_BASE_URL="https://api.soniox.com"
                export CHAR_API_KEY="${SONIOX_API_KEY}"
                ;;
              gladia)
                : "${GLADIA_API_KEY:?GLADIA_API_KEY is required}"
                export CHAR_BASE_URL="https://api.gladia.io/v2"
                export CHAR_API_KEY="${GLADIA_API_KEY}"
                ;;
              fireworks)
                : "${FIREWORKS_API_KEY:?FIREWORKS_API_KEY is required}"
                export CHAR_BASE_URL="https://api.fireworks.ai"
                export CHAR_API_KEY="${FIREWORKS_API_KEY}"
                ;;
              openai)
                : "${OPENAI_API_KEY:?OPENAI_API_KEY is required}"
                export CHAR_BASE_URL="https://api.openai.com/v1"
                export CHAR_API_KEY="${OPENAI_API_KEY}"
                ;;
              elevenlabs)
                : "${ELEVENLABS_API_KEY:?ELEVENLABS_API_KEY is required}"
                export CHAR_BASE_URL="https://api.elevenlabs.io"
                export CHAR_API_KEY="${ELEVENLABS_API_KEY}"
                ;;
              *)
                echo "Unknown provider: $provider"
                exit 1
                ;;
            esac

            echo "Provider: $provider"
            echo "Base URL: $CHAR_BASE_URL"
            echo "Input: $input"

            transcript="$(cargo run -p cli -- batch --input "$input" --provider "$provider" --quiet)"
            echo "$transcript"

            if [ -z "$(echo "$transcript" | tr -d "[:space:]")" ]; then
              echo "Empty transcript"
              exit 1
            fi
          '
        env:
          PROVIDER: ${{ needs.setup.outputs.provider }}
          INPUT: crates/data/src/english_1/audio.wav
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
