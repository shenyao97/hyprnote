on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        type: choice
        options:
          - nightly
          - stable

concurrency:
  group: ${{ github.workflow }}-${{ inputs.channel }}
  cancel-in-progress: true

jobs:
  compute-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - run: git fetch --tags --force
      - uses: ./.github/actions/doxxer_install
      - id: version
        run: |
          if [[ "${{ inputs.channel }}" == "nightly" ]]; then
            LATEST_TAG=$(git tag -l 'cli_v*' --sort=-creatordate | head -n1)
            if [[ "$LATEST_TAG" == *"-nightly"* ]]; then
              VERSION=$(doxxer --config doxxer.cli.toml next prerelease)
            else
              VERSION=$(doxxer --config doxxer.cli.toml next pre-patch)
            fi
          else
            VERSION=$(doxxer --config doxxer.cli.toml next patch)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Computed version: $VERSION"

  build:
    needs: compute-version
    runs-on: depot-macos-15
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust_install
        with:
          platform: macos
      - run: echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV
      - run: cargo build --release -p cli --target aarch64-apple-darwin
      - run: |
          BIN="target/aarch64-apple-darwin/release/char"
          strip -x "$BIN"
          ARCHIVE="char-${{ needs.compute-version.outputs.version }}-aarch64-apple-darwin.tar.xz"
          tar -cJf "$ARCHIVE" -C "target/aarch64-apple-darwin/release" char
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v4
        with:
          name: char-aarch64-apple-darwin
          path: ${{ env.ARCHIVE }}
          retention-days: 3

  publish-npm:
    needs: [compute-version, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@11.5.1
      - run: |
          node -v
          npm -v
      - run: |
          cd apps/cli/npm
          VERSION="${{ needs.compute-version.outputs.version }}"
          NPM_TAG="${{ inputs.channel == 'nightly' && 'nightly' || 'latest' }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm publish --tag "$NPM_TAG"

  create-tag:
    needs: [compute-version, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: cli_v${{ needs.compute-version.outputs.version }}
          tag_prefix: ""

  release:
    needs: [compute-version, build, create-tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - run: git fetch --tags --force
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - id: checksums
        uses: ./.github/actions/generate_checksums
        with:
          files: |
            artifacts/char-${{ needs.compute-version.outputs.version }}-aarch64-apple-darwin.tar.xz
      - id: artifacts
        run: |
          TARBALLS=$(ls artifacts/*.tar.xz | tr '\n' ',')
          CHECKSUMS=$(ls artifacts/*.sha256 | tr '\n' ',')
          echo "list=${TARBALLS}${CHECKSUMS}" >> $GITHUB_OUTPUT
      - id: release-body
        env:
          VERSION: ${{ needs.compute-version.outputs.version }}
        run: |
          CURRENT_TAG="cli_v$VERSION"
          PREV_TAG=$(git tag -l 'cli_v*' --sort=-v:refname | grep -v "^$CURRENT_TAG$" | head -n1)

          if [[ -n "$PREV_TAG" ]]; then
            echo "value=https://github.com/${{ github.repository }}/compare/$PREV_TAG...$CURRENT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "value=https://github.com/${{ github.repository }}/commits/$CURRENT_TAG" >> "$GITHUB_OUTPUT"
          fi
      - uses: ncipollo/release-action@v1
        with:
          tag: cli_v${{ needs.compute-version.outputs.version }}
          name: char_v${{ needs.compute-version.outputs.version }}
          body: ${{ steps.release-body.outputs.value }}
          prerelease: ${{ inputs.channel == 'nightly' }}
          artifacts: ${{ steps.artifacts.outputs.list }}
